site_name: ai-lab-investment
repo_url: https://github.com/vgreg/ai-lab-investment
site_url: https://vgreg.github.io/ai-lab-investment
site_description: This is a template repository for research projects that use Python and Quarto.
site_author: Vincent Grégoire
edit_uri: edit/main/docs/
repo_name: vgreg/ai-lab-investment
copyright: Maintained by <a href="https://vgreg.com">vgreg</a>.

nav:
  - Home: index.md
  - Modules: modules.md
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [
            "src/ai_lab_investment"
            ]
theme:
  name: material
  feature:
    tabs: true
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/vgreg/ai-lab-investment
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/ai-lab-investment

markdown_extensions:
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
